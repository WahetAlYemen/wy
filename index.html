<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>واحة اليمن — قريباً</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Cairo', sans-serif;
      background: #1a0a02;
      color: #fdf6e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    /* background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(200,150,12,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(200,150,12,0.07) 0%, transparent 60%);
      pointer-events: none;
    }

    .card {
      position: relative;
      max-width: 480px;
      width: 100%;
    }

    .logo-wrap {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      overflow: hidden;
      margin: 0 auto 28px;
      border: 2px solid rgba(200,150,12,0.4);
      box-shadow: 0 0 40px rgba(200,150,12,0.2);
    }
    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(200,150,12,0.12);
      border: 1px solid rgba(200,150,12,0.3);
      border-radius: 30px;
      padding: 5px 16px;
      font-size: 0.78rem;
      color: #C8960C;
      font-weight: 700;
      margin-bottom: 20px;
      letter-spacing: 0.04em;
    }
    .badge-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #C8960C;
      animation: pulse 1.8s ease-in-out infinite;
    }

    h1 {
      font-size: clamp(2rem, 7vw, 3rem);
      font-weight: 900;
      color: #fdf6e8;
      line-height: 1.15;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 1rem;
      color: rgba(253,246,232,0.5);
      margin-bottom: 36px;
      line-height: 1.7;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #C8960C, transparent);
      margin: 0 auto 36px;
    }

    .message {
      font-size: 1.05rem;
      color: rgba(253,246,232,0.75);
      line-height: 1.8;
      margin-bottom: 40px;
    }
    .message strong { color: #C8960C; }

    .phones {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
    }
    .phones-label {
      font-size: 0.8rem;
      color: rgba(253,246,232,0.35);
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }
    .phone-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #fdf6e8;
      text-decoration: none;
      font-size: 1.05rem;
      font-weight: 700;
      background: rgba(200,150,12,0.1);
      border: 1px solid rgba(200,150,12,0.25);
      border-radius: 12px;
      padding: 10px 24px;
      transition: background 0.2s, border-color 0.2s;
      width: 100%;
      max-width: 260px;
      justify-content: center;
    }
    .phone-link:hover { background: rgba(200,150,12,0.2); border-color: rgba(200,150,12,0.5); }
    .phone-link svg { color: #C8960C; flex-shrink: 0; }

    .branch-name {
      font-size: 0.72rem;
      color: rgba(253,246,232,0.4);
      display: block;
      margin-top: 2px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <img src="brand_assets/263050197_102917078909985_2041387502624040699_n (1).jpg" alt="واحة اليمن">
    </div>

    <div class="badge">
      <span class="badge-dot"></span>
      تحت الصيانة
    </div>

    <h1>واحة اليمن</h1>
    <p class="subtitle">للمأكولات اليمنية والمصرية والخليجية</p>

    <div class="divider"></div>

    <p class="message">
      نعمل على تحسين تجربتك<br>
      <strong>سنعود قريباً بشكل أجمل</strong>
    </p>

    <div class="phones">
      <p class="phones-label">للطلب والاستفسار اتصل بنا</p>
      <a href="tel:01112223232" class="phone-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.67A2 2 0 012 1h3a2 2 0 012 1.72c.13.96.36 1.9.7 2.81a2 2 0 01-.45 2.11L6.91 8.92a16 16 0 006.17 6.17l1.27-1.27a2 2 0 012.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0122 16.92z"/></svg>
        01112223232
        <span class="branch-name">فرع المهندسين</span>
      </a>
      <a href="tel:01118883232" class="phone-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.67A2 2 0 012 1h3a2 2 0 012 1.72c.13.96.36 1.9.7 2.81a2 2 0 01-.45 2.11L6.91 8.92a16 16 0 006.17 6.17l1.27-1.27a2 2 0 012.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0122 16.92z"/></svg>
        01118883232
        <span class="branch-name">فرع الشيخ زايد</span>
      </a>
    </div>
  </div>
</body>
</html>
